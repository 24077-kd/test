<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사내 민원 접수</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- React 18 + Babel standalone (브라우저 내 JSX 변환 — 별도 빌드 불필요) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 원본 컴포넌트가 쓰는 디자인 시스템 변수 정의 (라이트 테마) */
    :root {
      --color-text-primary:     #1a1a1a;
      --color-text-secondary:   #555b62;
      --color-text-tertiary:    #8a9099;
      --color-background-primary:   #ffffff;
      --color-background-secondary: #f4f6f8;
      --color-border-secondary:  #d4d9df;
      --color-border-tertiary:   #e6e9ed;
    }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 24px 16px; background: var(--color-background-secondary);
           font-family: 'Noto Sans KR', sans-serif; color: var(--color-text-primary); }
    #root-card { max-width: 720px; margin: 0 auto; background: var(--color-background-primary);
                 border: 0.5px solid var(--color-border-tertiary); border-radius: 16px;
                 padding: 8px 32px 24px; box-shadow: 0 4px 20px rgba(0,0,0,.05); }
    .server-err { margin: 8px 0 0; padding: 12px 14px; border-radius: 10px;
                  background: #FDECEC; border: 0.5px solid #F4B9B8; color: #B23332; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root-card"><div id="root"></div></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const CATEGORIES = [
      { value: "cooling", label: "냉방" },
      { value: "heating", label: "난방" },
      { value: "cleaning", label: "청소" },
      { value: "complaint", label: "불편사항" },
    ];

    const INITIAL = {
      department: "", name: "", category: "", place: "", what: "",
    };

    function ComplaintForm({ onBack }) {
      const [form, setForm] = useState(INITIAL);
      const [submitted, setSubmitted] = useState(false);
      const [loading, setLoading] = useState(false);
      const [errors, setErrors] = useState({});
      const [serverError, setServerError] = useState(null);
      const [result, setResult] = useState(null); // 서버 응답(접수번호/담당부서/구조화)
      const [photos, setPhotos] = useState([]);   // 첨부 사진 파일 목록

      const set = (field) => (e) =>
        setForm((prev) => ({ ...prev, [field]: e.target.value }));

      const validate = () => {
        const e = {};
        if (!form.department) e.department = "소속을 입력해주세요";
        if (!form.name) e.name = "성명을 입력해주세요";
        if (!form.category) e.category = "민원 유형을 선택해주세요";
        if (!form.place) e.place = "민원 장소를 입력해주세요";
        if (!form.what) e.what = "민원 내용을 입력해주세요";
        return e;
      };

      const handleSubmit = async () => {
        const e = validate();
        if (Object.keys(e).length > 0) { setErrors(e); return; }
        setLoading(true);
        setServerError(null);

        // 입력값 → 백엔드(POST /minwon) 입력으로 매핑
        const catLabel = CATEGORIES.find((c) => c.value === form.category)?.label || form.category;
        const body = new FormData();
        body.set("content", `[민원유형] ${catLabel}\n${form.what}`);
        body.set("location", form.place);
        body.set("requester", `${form.department} · ${form.name}`);
        body.set("category", catLabel);
        photos.forEach((f) => body.append("photos", f));

        try {
          const res = await fetch("/minwon", { method: "POST", body });
          const data = await res.json();
          if (data.ok) {
            setResult(data);
            setSubmitted(true);
          } else {
            setServerError(data.error || "접수 처리 중 오류가 발생했습니다.");
          }
        } catch (err) {
          setServerError("네트워크 오류: " + err);
        } finally {
          setLoading(false);
        }
      };

      const handleReset = () => {
        setForm(INITIAL);
        setErrors({});
        setSubmitted(false);
        setServerError(null);
        setResult(null);
        setPhotos([]);
      };

      if (submitted && result) {
        const s = result.structured || {};
        return (
          <div className="success-wrap">
            <div className="success-icon">✓</div>
            <h2>접수가 완료되었습니다</h2>
            <p className="success-sub">
              담당부서로 메일이 발송되었으며, 처리 현황은 별도로 안내드립니다.
            </p>
            {result.warning && (
              <div className="server-err" style={{ background: "#FFF6E5", borderColor: "#F2D08A", color: "#8A6A1A", textAlign: "left" }}>
                ⚠ {result.warning}
              </div>
            )}
            <div className="success-summary">
              <div className="summary-row"><span>접수번호</span><span>#{result.minwon_id}</span></div>
              <div className="summary-row"><span>담당부서</span><span>{result.department}</span></div>
              <div className="summary-row"><span>접수자</span><span>{form.department} · {form.name}</span></div>
              <div className="summary-row"><span>민원 유형</span><span>{s.category || CATEGORIES.find(c => c.value === form.category)?.label}{s.priority ? ` · 긴급도 ${s.priority}` : ""}</span></div>
              {s.title && <div className="summary-row"><span>제목</span><span>{s.title}</span></div>}
              <div className="summary-row"><span>장소</span><span>{form.place}</span></div>
              {photos.length > 0 && <div className="summary-row"><span>첨부</span><span>사진 {photos.length}장</span></div>}
            </div>
            <button className="btn-reset" onClick={handleReset}>새 민원 접수하기</button>
          </div>
        );
      }

      const field = (key) => ({
        onChange: (e) => {
          set(key)(e);
          if (errors[key]) setErrors((prev) => ({ ...prev, [key]: null }));
        },
        className: errors[key] ? "input-err" : "",
      });

      return (
        <div className="form-wrap">
          <header className="form-header">
            {onBack && <button type="button" className="btn-back" onClick={onBack}>← 처음으로</button>}
            <span className="header-badge">민원신청 · 간편접수</span>
            <h1>민원 신청서</h1>
            <p>접수 후 담당부서로 자동 통보되며, 처리 현황을 안내해드립니다.</p>
          </header>

          <section className="form-section">
            <div className="section-label">
              <span className="section-num">01</span>요청자 정보
            </div>
            <div className="row-2">
              <div className="field-group">
                <label>소속 부서 <span className="req">*</span></label>
                <input type="text" placeholder="예) 총무팀" value={form.department} {...field("department")} />
                {errors.department && <span className="err-msg">{errors.department}</span>}
              </div>
              <div className="field-group">
                <label>성명 <span className="req">*</span></label>
                <input type="text" placeholder="예) 홍길동" value={form.name} {...field("name")} />
                {errors.name && <span className="err-msg">{errors.name}</span>}
              </div>
            </div>
          </section>

          <section className="form-section">
            <div className="section-label">
              <span className="section-num">02</span>민원 내용
            </div>
            <div className="field-group" style={{ marginBottom: "12px" }}>
              <label>민원 유형 <span className="req">*</span></label>
              <div className="category-grid">
                {CATEGORIES.map((c) => (
                  <button key={c.value} type="button"
                    className={`cat-btn ${form.category === c.value ? "cat-btn--active" : ""}`}
                    onClick={() => {
                      setForm((p) => ({ ...p, category: c.value }));
                      if (errors.category) setErrors((p) => ({ ...p, category: null }));
                    }}>
                    {c.label}
                  </button>
                ))}
              </div>
              {errors.category && <span className="err-msg">{errors.category}</span>}
            </div>
            <div className="field-group" style={{ marginBottom: "12px" }}>
              <label>민원 장소 <span className="req">*</span></label>
              <input type="text" placeholder="예) 본관 12층 사무실 / 7층 남자화장실" value={form.place} {...field("place")} />
              {errors.place && <span className="err-msg">{errors.place}</span>}
            </div>
            <div className="field-group" style={{ marginBottom: "12px" }}>
              <label>민원 내용 <span className="req">*</span></label>
              <textarea rows={5} placeholder="민원 내용을 구체적으로 작성해주세요. (예) 12층 사무실 냉방이 약해 오후 내내 덥습니다." value={form.what} {...field("what")} />
              {errors.what && <span className="err-msg">{errors.what}</span>}
            </div>
            <div className="field-group">
              <label>사진 첨부 <span className="optional">(선택)</span></label>
              <input type="file" accept="image/*" multiple
                onChange={(e) => setPhotos(Array.from(e.target.files))} />
              {photos.length > 0 && (
                <span className="file-hint">📎 {photos.length}장 선택됨 · {photos.map((f) => f.name).join(", ")}</span>
              )}
            </div>
          </section>

          {serverError && <div className="server-err">❌ {serverError}</div>}

          <div className="submit-wrap">
            <button className="btn-submit" onClick={handleSubmit} disabled={loading}>
              {loading ? "접수 중..." : "접수하기"}
            </button>
          </div>

          <style>{`
            .form-wrap { max-width: 680px; margin: 0 auto; font-family: 'Noto Sans KR', sans-serif; }
            .form-header { padding: 2rem 0 1.5rem; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 0; }
            .btn-back { display: inline-block; background: none; border: none; color: var(--color-text-secondary); font-size: 13px; cursor: pointer; padding: 0 0 12px; fon...
